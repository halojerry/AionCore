name: Sync Upstream Main

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repository (owner/name)'
        required: false
        default: 'iOfficeAI/AionCore'
        type: string
      upstream_branch:
        description: 'Upstream branch to sync from'
        required: false
        default: 'main'
        type: string
      target_branch:
        description: 'Target branch to sync into (never main or dev directly)'
        required: false
        default: 'feature/upstream-sync'
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: "sync-upstream-${{ inputs.target_branch || 'feature/upstream-sync' }}"
  cancel-in-progress: true

jobs:
  validate:
    name: Validate target
    runs-on: ubuntu-latest
    steps:
      - name: Check target branch
        shell: bash
        env:
          TARGET: "${{ inputs.target_branch || 'feature/upstream-sync' }}"
        run: |
          if [ "$TARGET" = "main" ]; then
            echo "::error::Syncing directly to main is forbidden. Use a feature branch (e.g. feature/upstream-sync) and PR to dev instead."
            exit 1
          fi
          if [ "$TARGET" = "dev" ]; then
            echo "::error::Syncing directly to dev is forbidden. Use a feature branch (e.g. feature/upstream-sync) and PR to dev instead."
            exit 1
          fi

  sync:
    name: Sync upstream branch
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: "${{ inputs.target_branch || 'main' }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        shell: bash
        env:
          UPSTREAM_REPO: "${{ inputs.upstream_repo || 'iOfficeAI/AionCore' }}"
        run: |
          set -euo pipefail
          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          fi
          git fetch origin --prune
          git fetch upstream --prune

      - name: Build sync branch
        id: sync
        shell: bash
        env:
          TARGET_BRANCH: "${{ inputs.target_branch || 'main' }}"
          UPSTREAM_BRANCH: "${{ inputs.upstream_branch || 'main' }}"
        run: |
          set -euo pipefail
          upstream_head=$(git rev-parse --short "upstream/${UPSTREAM_BRANCH}")
          sync_branch="sync/upstream-${TARGET_BRANCH}-${upstream_head}"
          base_ref="origin/${TARGET_BRANCH}"

          git checkout -B "$sync_branch" "$base_ref"

          if git merge --ff-only "upstream/${UPSTREAM_BRANCH}"; then
            echo "branch=$sync_branch" >> "$GITHUB_OUTPUT"
            echo "upstream_head=$upstream_head" >> "$GITHUB_OUTPUT"
          else
            echo "::error::${TARGET_BRANCH} is not a fast-forward of upstream/${UPSTREAM_BRANCH}. Manual reconciliation is required."
            git log --oneline --decorate --graph --max-count=30 "$base_ref" "upstream/${UPSTREAM_BRANCH}"
            exit 1
          fi

      - name: Push sync branch
        shell: bash
        run: git push origin "HEAD:${{ steps.sync.outputs.branch }}" --force-with-lease

      - name: Create or update pull request
        env:
          GH_TOKEN: "${{ github.token }}"
          TARGET_BRANCH: "${{ inputs.target_branch || 'main' }}"
          UPSTREAM_BRANCH: "${{ inputs.upstream_branch || 'main' }}"
          UPSTREAM_REPO: "${{ inputs.upstream_repo || 'iOfficeAI/AionCore' }}"
          SYNC_BRANCH: "${{ steps.sync.outputs.branch }}"
          UPSTREAM_HEAD: "${{ steps.sync.outputs.upstream_head }}"
        run: |
          set -euo pipefail
          title="chore: sync ${TARGET_BRANCH} from upstream/${UPSTREAM_BRANCH}"
          body=$(printf 'Sync generated by GitHub Actions.\n\n- Upstream: `%s`\n- Upstream branch: `%s`\n- Upstream head: `%s`\n- Target branch: `%s`\n- Sync branch: `%s`' "$UPSTREAM_REPO" "$UPSTREAM_BRANCH" "$UPSTREAM_HEAD" "$TARGET_BRANCH" "$SYNC_BRANCH")
          pr_number=$(gh pr list --head "$SYNC_BRANCH" --base "$TARGET_BRANCH" --json number --jq '.[0].number')
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --title "$title" --body "$body"
          else
            gh pr create --base "$TARGET_BRANCH" --head "$SYNC_BRANCH" --title "$title" --body "$body"
          fi
