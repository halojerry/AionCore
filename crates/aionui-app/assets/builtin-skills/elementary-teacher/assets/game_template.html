<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary-color: #7e57c2;
            --secondary-color: #42a5f5;
            --text-bg: rgba(255, 255, 255, 0.92);
            --text-color: #333;
            --btn-bg: rgba(255, 255, 255, 0.95);
            --btn-hover: #fff;
            --font-main: "Microsoft YaHei", "SimHei", "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, #e0f7fa 0%, #e8eaf6 30%, #f3e5f5 60%, #fce4ec 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            aspect-ratio: 16/9;
            background-color: #333;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(126, 87, 194, 0.3);
            border-radius: 12px;
        }

        /* Loading Screen */
        #loading-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s;
        }
        
        #loading-layer.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(126, 87, 194, 0.2);
            border-top: 4px solid #7e57c2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            color: #5c6bc0;
            margin-top: 20px;
            font-size: 1.2em;
        }
        
        .loading-progress {
            color: #9e9e9e;
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Background Image Layer */
        #bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #e8eaf6;
            transition: opacity 0.5s ease-in-out;
            z-index: 0;
        }
        
        #bg-layer.fade-out {
            opacity: 0;
        }

        /* Mobile Adaptation */
        @media (max-width: 768px) {
            #bg-layer {
                background-size: contain;
                background-repeat: no-repeat;
                background-position: center 18vh;
            }
        }

        /* Content Layer */
        .layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Start Screen */
        .start-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 60px;
            border-radius: 16px;
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(126, 87, 194, 0.2);
            border: 2px solid rgba(171, 71, 188, 0.15);
        }

        .start-card h1 { 
            font-size: 2.5em; 
            margin-bottom: 15px; 
            background: linear-gradient(135deg, #42a5f5, #ab47bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .start-card p { 
            font-size: 1.2em; 
            line-height: 1.6; 
            margin-bottom: 25px; 
            color: #555; 
        }
        
        button {
            padding: 12px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            background: linear-gradient(135deg, #42a5f5, #7e57c2);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(126, 87, 194, 0.3);
        }
        
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(126, 87, 194, 0.4); 
        }

        /* Game UI */
        #dialogue-box {
            position: absolute;
            bottom: 5%;
            left: 5%;
            width: 90%;
            background: var(--text-bg);
            padding: 25px 35px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(171, 71, 188, 0.15);
        }

        #story-text {
            font-size: 1.3em;
            line-height: 1.6;
            color: #222;
            min-height: 80px;
        }

        .choices-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .choice-btn {
            background: white;
            color: #333;
            border: 2px solid rgba(171, 71, 188, 0.3);
            padding: 10px 20px;
            font-size: 1em;
            text-align: center;
            flex: 1 1 300px;
            border-radius: 20px;
        }

        .choice-btn:hover {
            border-color: #7e57c2;
            color: #7e57c2;
            background: #f3e5f5;
        }

        /* Feedback Overlay */
        #feedback-layer {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .feedback-card {
            background: white;
            padding: 35px 50px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 2px solid rgba(171, 71, 188, 0.15);
        }

        .feedback-correct {
            border-top: 5px solid #66bb6a;
        }

        .feedback-wrong {
            border-top: 5px solid #ef5350;
        }

        .feedback-card h2 {
            margin-bottom: 15px;
        }

        .feedback-card h2.correct { color: #43a047; }
        .feedback-card h2.wrong { color: #e53935; }

        /* Review Screen */
        #review-layer {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
        }

        .review-card {
            background: #fff;
            width: 80%;
            height: 80%;
            border-radius: 20px;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .review-section {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        
        .review-section h2 { 
            color: #7e57c2; 
            margin-bottom: 15px; 
        }

        .review-list li { 
            margin-bottom: 10px; 
            line-height: 1.5; 
            color: #555; 
            list-style-position: inside;
        }

        .path-item { 
            padding: 10px; 
            background: #f5f5f5; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            font-size: 0.9em; 
        }
        .path-item.correct { border-left: 4px solid #66bb6a; }
        .path-item.wrong { border-left: 4px solid #ef5350; }

        /* Stars animation */
        .star-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 200;
        }

        .star {
            position: absolute;
            font-size: 2em;
            animation: starFall 1.5s ease-out forwards;
        }

        @keyframes starFall {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(100px) scale(0.3); }
        }

        /* Animation */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .fade-in { animation: fadeIn 0.5s forwards; }

        /* Progress indicator in game */
        .game-progress {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 50;
            background: rgba(255,255,255,0.85);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #5c6bc0;
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid rgba(171, 71, 188, 0.15);
        }

    </style>
</head>
<body>

    <div id="game-container">
        <!-- Loading Screen -->
        <div id="loading-layer">
            <div class="loading-spinner"></div>
            <div class="loading-text">🌟 课文通关游戏加载中...</div>
            <div class="loading-progress" id="loading-progress">准备游戏</div>
        </div>

        <!-- Background -->
        <div id="bg-layer" style="background-image: url('');"></div>

        <!-- Game Progress -->
        <div class="game-progress" id="game-progress">🌟 第 1 关</div>

        <!-- Start Screen -->
        <div id="start-layer" class="layer active">
            <div class="start-card fade-in">
                <h1 id="title-text">{{ title }}</h1>
                <p id="intro-text"></p>
                <button onclick="game.start()">🎮 开始挑战</button>
            </div>
        </div>

        <!-- Gameplay Screen -->
        <div id="game-layer" class="layer">
            <div id="dialogue-box">
                <p id="story-text"></p>
                <div class="choices-container" id="choices-area">
                    <!-- Buttons injected here -->
                </div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback-layer" class="layer">
            <div class="feedback-card fade-in" id="feedback-card">
                <h2 id="feedback-title"></h2>
                <p id="feedback-text"></p>
                <button onclick="game.nextScene()" style="margin-top: 20px;">继续前进 →</button>
            </div>
        </div>

        <!-- Review Screen -->
        <div id="review-layer" class="layer">
            <div class="review-card fade-in">
                <h1 style="text-align: center; margin-bottom: 20px;">🏆 通关复盘</h1>
                
                <div class="review-section">
                    <h2>📚 你的闯关路径</h2>
                    <div id="path-review-list"></div>
                </div>

                <div class="review-section">
                    <h2>💡 核心知识点</h2>
                    <ul class="review-list" id="knowledge-points"></ul>
                </div>

                <div class="review-section" style="border:none;">
                    <h2>🗣️ 课堂讨论</h2>
                    <ul class="review-list" id="discussion-questions"></ul>
                </div>
                
                <button onclick="location.reload()" style="align-self: center; margin-top: 20px;">🔄 再来一次</button>
            </div>
        </div>
    </div>

    <!-- Stars container for correct answer animation -->
    <div class="star-container" id="star-container"></div>

    <script>
        // Data injected by Python Builder
        const gameData = {{ game_data }};

        class GameEngine {
            constructor(data) {
                this.data = data;
                this.currentSceneId = data.start_scene_id;
                this.history = [];
                this.imageCache = {};
                this.sceneChoicesOrder = {};
                this.failedImages = [];
                this.totalScenes = data.scenes ? data.scenes.length : 0;
                
                document.getElementById('loading-progress').innerText = '加载配置...';
                document.getElementById('intro-text').innerText = data.intro;
                
                this.preloadAllImages().then(() => {
                    if (data.cover_image && this.imageCache[data.cover_image]) {
                        document.getElementById('bg-layer').style.backgroundImage = `url('${data.cover_image}')`;
                    }
                    
                    if (this.failedImages.length > 0) {
                        const failedList = this.failedImages.join(', ');
                        console.error(`以下图片加载失败: ${failedList}`);
                    }
                    
                    setTimeout(() => {
                        document.getElementById('loading-layer').classList.add('hidden');
                    }, 500);
                    
                    this.renderReviewStatic();
                }).catch((error) => {
                    console.error('预加载失败:', error);
                    document.getElementById('loading-progress').innerText = '加载失败，请刷新重试';
                });
            }

            preloadAllImages() {
                const imageUrls = [];
                
                if (this.data.cover_image) {
                    imageUrls.push(this.data.cover_image);
                }
                
                if (this.data.scenes) {
                    this.data.scenes.forEach(scene => {
                        if (scene.image) {
                            imageUrls.push(scene.image);
                        }
                    });
                }
                
                const total = imageUrls.length;
                let loaded = 0;
                
                const updateProgress = () => {
                    loaded++;
                    const percent = Math.round((loaded / total) * 100);
                    document.getElementById('loading-progress').innerText = `加载资源 ${loaded}/${total} (${percent}%)`;
                };
                
                const promises = imageUrls.map(url => 
                    this.preloadImage(url).then(updateProgress)
                );
                
                return Promise.all(promises);
            }

            preloadImage(url) {
                return new Promise((resolve) => {
                    if (this.imageCache[url]) {
                        resolve(this.imageCache[url]);
                        return;
                    }
                    
                    const img = new Image();
                    img.onload = () => {
                        this.imageCache[url] = img;
                        resolve(img);
                    };
                    img.onerror = () => {
                        this.failedImages.push(url);
                        resolve(null);
                    };
                    img.src = url;
                });
            }

            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            start() {
                this.switchLayer('game-layer');
                this.loadScene(this.currentSceneId);
            }

            loadScene(sceneId) {
                const scene = this.data.scenes.find(s => s.id === sceneId);
                
                if (!scene) {
                    this.finish();
                    return;
                }

                // Update progress indicator
                const sceneIndex = this.data.scenes.findIndex(s => s.id === sceneId);
                document.getElementById('game-progress').textContent = `🌟 第 ${sceneIndex + 1}/${this.totalScenes} 关`;

                const bgLayer = document.getElementById('bg-layer');
                const textBox = document.getElementById('story-text');
                const choicesArea = document.getElementById('choices-area');

                if (scene.image) {
                    if (!this.imageCache[scene.image]) {
                        const retryImg = new Image();
                        retryImg.onload = () => {
                            this.imageCache[scene.image] = retryImg;
                            bgLayer.style.backgroundImage = `url('${scene.image}')`;
                        };
                        retryImg.src = scene.image;
                    } else {
                        bgLayer.classList.add('fade-out');
                        setTimeout(() => {
                            bgLayer.style.backgroundImage = `url('${scene.image}')`;
                            bgLayer.classList.remove('fade-out');
                        }, 300);
                    }
                }

                textBox.innerHTML = scene.text;
                textBox.classList.remove('fade-in');
                void textBox.offsetWidth;
                textBox.classList.add('fade-in');

                choicesArea.innerHTML = '';
                
                if (scene.choices && scene.choices.length > 0) {
                    if (!this.sceneChoicesOrder[sceneId]) {
                        this.sceneChoicesOrder[sceneId] = this.shuffleArray(scene.choices);
                    }
                    const orderedChoices = this.sceneChoicesOrder[sceneId];
                    
                    orderedChoices.forEach(choice => {
                        const btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        btn.innerText = choice.text;
                        btn.onclick = () => this.handleChoice(scene, choice);
                        choicesArea.appendChild(btn);
                    });
                } else {
                    setTimeout(() => {
                        this.finish();
                    }, 2000);
                }
            }

            handleChoice(scene, choice) {
                if (choice.is_correct) {
                    this.history.push({
                        sceneTitle: `场景 ${this.history.length + 1}`,
                        choiceText: choice.text,
                        isCorrect: choice.is_correct,
                        feedback: choice.feedback
                    });
                    this.showStars();
                }

                this.showFeedback(choice);
            }

            showFeedback(choice) {
                const feedbackLayer = document.getElementById('feedback-layer');
                const feedbackCard = document.getElementById('feedback-card');
                const feedbackTitle = document.getElementById('feedback-title');
                const feedbackText = document.getElementById('feedback-text');

                feedbackCard.className = 'feedback-card fade-in ' + (choice.is_correct ? 'feedback-correct' : 'feedback-wrong');
                feedbackTitle.className = choice.is_correct ? 'correct' : 'wrong';
                feedbackTitle.textContent = choice.is_correct ? '✅ 回答正确！' : '❌ 再想想哦~';
                feedbackText.textContent = choice.feedback || (choice.is_correct ? '你真棒！' : '加油，再试一次！');
                
                // Update button text based on correctness
                const nextBtn = feedbackCard.querySelector('button');
                nextBtn.textContent = choice.is_correct ? '继续前进 →' : '重新选择';

                this.switchLayer('feedback-layer');
                
                // Store choice info for next scene navigation
                this._lastChoice = choice;
            }

            nextScene() {
                const choice = this._lastChoice;
                if (choice.is_correct) {
                    const nextSceneId = choice.next_scene_id;
                    this.switchLayer('game-layer');
                    this.loadScene(nextSceneId);
                } else {
                    // Stay on current scene, re-show it
                    this.switchLayer('game-layer');
                    this.loadScene(this.currentSceneId);
                }
            }

            switchLayer(layerId) {
                document.querySelectorAll('.layer').forEach(layer => {
                    layer.classList.remove('active');
                });
                document.getElementById(layerId).classList.add('active');
                
                // Update current scene ID for wrong choice retry
                if (layerId === 'game-layer') {
                    // currentSceneId stays the same
                }
            }

            showStars() {
                const container = document.getElementById('star-container');
                const emojis = ['🌟', '⭐', '✨', '💫', '🎉'];
                for (let i = 0; i < 8; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 50 + '%';
                    star.style.animationDelay = Math.random() * 0.5 + 's';
                    container.appendChild(star);
                    setTimeout(() => star.remove(), 2000);
                }
            }

            finish() {
                this.renderReviewDynamic();
                this.switchLayer('review-layer');
            }

            renderReviewStatic() {
                // Render knowledge points
                const kpList = document.getElementById('knowledge-points');
                const review = this.data.review || {};
                const knowledgePoints = review.knowledge_points || [];
                kpList.innerHTML = knowledgePoints.map(kp => `<li>${kp}</li>`).join('');

                // Render discussion questions
                const dqList = document.getElementById('discussion-questions');
                const discussion = review.discussion || [];
                dqList.innerHTML = discussion.map(d => `<li>${d}</li>`).join('');
            }

            renderReviewDynamic() {
                // Render path review
                const pathList = document.getElementById('path-review-list');
                pathList.innerHTML = this.history.map(h => {
                    const cls = h.isCorrect ? 'correct' : 'wrong';
                    const icon = h.isCorrect ? '✅' : '❌';
                    return `<div class="path-item ${cls}">${icon} ${h.sceneTitle}: ${h.choiceText} — ${h.feedback}</div>`;
                }).join('');
            }
        }

        const game = new GameEngine(gameData);
    </script>
</body>
</html>
