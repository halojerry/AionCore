# Ruff lint + format 钩子。rev 锁不可变 tag (2026-06 实测最新)。
# 用 `pre-commit autoupdate` 升级 rev；CI 跑 `pre-commit run --all-files`。
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
