# db09 受控术语表 (controlled glossary) —— 单一事实源 (SSOT)
# 用途：所有材料(论文/PPT/软著/竞赛/代码注释)的术语从此派生，禁止下游各写各的。
# 审计脚本 consistency_audit.py 读取本文件，检测"受控术语被同义改写/替换"。
#
# 字段说明：
#   canonical : 唯一规范写法(出现在所有材料里的就该长这样)
#   id        : 稳定标识(变更广播用，措辞可改、id 不可改)
#   aliases   : 允许的等价写法(如全称↔缩写)。审计视为"合法",但会提示是否需统一
#   forbidden : 禁用的近义/错误写法。审计命中即报 SUBSTITUTION 冲突
#   case_lock : 大小写/连字符锁定(如 fine-tune 不写 finetune)；true=严格匹配
#   must_cover: 贡献级标记(X-4)。true=该术语属核心贡献，缺席某材料报 WARN；
#               缺省/false=一般术语，缺席只降 INFO，避免覆盖缺口刷屏。
#   zh / en   : 中英对照译法(跨语言材料一致)
#   note      : 备注
#   forbidden 项可写字符串，或 {text:.., placeholder: true} 标记说明性占位(审计跳过)

schema_version: "1.0"
project: "<项目名占位>"
last_checked_date: "2026-06-06"

terms:
  - id: term.method_main
    canonical: "DCA-Net"
    aliases: ["Dual-Cross Attention Network"]      # 全称允许
    forbidden: ["DCANet", "DCA Net", "DCA网络", "双交叉网络"]
    case_lock: true
    must_cover: true                                # 主方法名属核心贡献，缺席报 WARN
    zh: "DCA-Net"
    en: "DCA-Net"
    note: "主方法名，连字符必须保留"

  - id: term.finetune
    canonical: "fine-tune"
    aliases: ["fine-tuning"]
    forbidden: ["finetune", "fine tune", "Finetune", "微调训练"]
    case_lock: true
    zh: "微调"
    en: "fine-tune"

  - id: term.dataset_main
    canonical: "CrowdScene-2k"
    aliases: ["CrowdScene"]
    forbidden: ["Crowd-Scene", "crowdscene", "CrowdScene2k", "人群场景数据集"]
    case_lock: true
    zh: "CrowdScene-2k 数据集"
    en: "CrowdScene-2k"

  - id: term.task
    canonical: "小目标检测"
    aliases: ["small object detection"]
    forbidden: ["小物体检测", "微小目标检测", "细粒度检测"]
    case_lock: false
    zh: "小目标检测"
    en: "small object detection"

# 创新点/贡献单一事实源(X-5)：CONTRIBUTION_DRIFT 检测的标准措辞基准。
# 与 db09 项目 terminology.md 的"创新点N"行同义(人读真相在 terminology.md，
# 由 a02 维护；此处为机读 schema 模式下的等价副本)。审计据 canonical 做
# token 覆盖+句级相似度漂移检测，标"同一贡献在 PPT/软著提法偏离"。
contributions:
  - id: 创新点1
    canonical: "双交叉注意力对通道与空间的联合建模提升小目标特征判别力"
  - id: 创新点2
    canonical: "尺度融合金字塔聚合多尺度上下文缓解小目标漏检"
