# db09 指标登记表 (metric registry) —— 指标的单一事实源
# 用途：锁定每个指标的"规范名 + 同义名 + 单位 + 权威数值"。
# 审计脚本据此检测两类冲突：
#   1) NAME    : 同一指标在不同材料用了不同名字(如 F1 vs 准确率)
#   2) VALUE   : 同一指标(同方法同数据集)在不同材料数值不一致(论文 vs PPT)
#
# 字段：
#   id        : 稳定标识
#   canonical : 规范指标名
#   aliases   : 合法同义名(审计接受但会提示统一)
#   confusable: 易混名——命中即报 NAME 冲突(语义不同却被当同一指标用)
#   unit      : 单位(% / ms / 无)；用于数值解析与对比
#   decimals  : 约定小数位(报告里数值精度统一)
#   must_cover: 贡献级标记(X-4)。true=核心指标，缺席某材料报 WARN；缺省=降 INFO
#   higher_is_better: true/false(辅助判断"提升/下降"措辞)
#   records   : 权威数值表(method × dataset → value)，作为 VALUE 比对基准

schema_version: "1.0"

metrics:
  - id: metric.f1
    canonical: "F1"
    aliases: ["F1-score", "F1 分数"]
    confusable: ["准确率", "Accuracy", "精确率", "召回率"]   # 这些不是 F1
    unit: "%"
    decimals: 1
    must_cover: true            # 主指标，论文/PPT/软著缺席即报 WARN
    higher_is_better: true
    records:
      - {method: "DCA-Net",  dataset: "CrowdScene-2k", value: 87.6}
      - {method: "YOLOv8",   dataset: "CrowdScene-2k", value: 82.3}

  - id: metric.map
    canonical: "mAP@0.5"
    aliases: ["mAP50", "mAP"]
    confusable: ["mAP@0.5:0.95", "AP", "平均精度(未标阈值)"]
    unit: "%"
    decimals: 1
    higher_is_better: true
    records:
      - {method: "DCA-Net",  dataset: "CrowdScene-2k", value: 74.2}
      - {method: "YOLOv8",   dataset: "CrowdScene-2k", value: 68.9}

  - id: metric.fps
    canonical: "FPS"
    aliases: ["帧率", "frames per second"]
    confusable: ["推理时延", "latency", "ms/帧"]            # 时延与帧率互为倒数，不可混用
    unit: ""
    decimals: 0
    higher_is_better: true
    records:
      - {method: "DCA-Net",  dataset: "CrowdScene-2k", value: 41}
      - {method: "YOLOv8",   dataset: "CrowdScene-2k", value: 55}

  - id: metric.params
    canonical: "参数量"
    aliases: ["Params", "参数规模"]
    confusable: ["FLOPs", "计算量", "模型大小(MB)"]
    unit: "M"
    decimals: 1
    higher_is_better: false
    records:
      - {method: "DCA-Net",  dataset: "CrowdScene-2k", value: 23.4}
      - {method: "YOLOv8",   dataset: "CrowdScene-2k", value: 25.9}
