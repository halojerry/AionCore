# Example rule file for quality_gate.py
# Run: python ../scripts/quality_gate.py --csv yourdata.csv --rules rules.example.yaml
# Exit code 0 = all pass, 1 = any failure (drop into CI as a data gate).

dataset:
  min_rows: 100            # reject tiny/empty extracts
  max_rows: 5000000        # guard against an unexpected blow-up
  no_duplicate_rows: true  # full-row duplicates not allowed

columns:
  user_id:
    required: true         # column must exist
    unique: true           # primary-key style uniqueness

  age:
    dtype: int             # int | float | numeric | string | bool | datetime
    required: true
    non_null: true         # no missing values allowed
    min: 0
    max: 120

  income:
    dtype: numeric
    min: 0                 # negatives are data errors here

  status:
    enum: [active, churned, paused]   # closed value set

  signup_date:
    dtype: datetime

  email:
    regex: "^[^@]+@[^@]+\\.[^@]+$"     # loose well-formedness check
