# OpenAPI 3.1 骨架（最小可用模板，按项目改 paths/schemas）
# 约定要点见 ../references.md 与 SKILL.md「接口设计」段。
openapi: 3.1.0
info:
  title: Example Research API
  version: "1.0.0"
servers:
  - url: https://api.example.com/v1   # base URL 版本化放 /v1
paths:
  /projects:
    get:
      summary: 列出项目（游标分页，优先于大 OFFSET）
      parameters:
        - { name: cursor, in: query, schema: { type: string }, description: 上一页返回的 next_cursor }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/Project" } }
                  next_cursor: { type: [string, "null"] }   # 3.1 用类型数组表 nullable；3.0 才用 nullable: true
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: 创建项目
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  schemas:
    Project:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        created_at: { type: string, format: date-time }
    ProjectCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
    Error:                       # 统一错误体，别漏 error 响应码与示例
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: "unauthorized" }
        message: { type: string, example: "缺少或无效的 bearer token" }
  responses:
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { code: "unauthorized", message: "缺少或无效的 bearer token" }
    ValidationError:
      description: 请求体校验失败
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example: { code: "validation_error", message: "name 不能为空" }
security:
  - bearerAuth: []
